services:
  - type: web
    runtime: node
    name: sales-insight-automator
    plan: free
    region: oregon
    rootDir: .
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: PORT
        value: 10000
      - key: SKIP_DB
        value: true
      - key: CORS_ORIGIN
        value: "*"
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.0-flash
      - key: AI_API_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: AI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
