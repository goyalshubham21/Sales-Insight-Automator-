services:
  - type: web
    runtime: node
    name: sales-insight-automator
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm --prefix frontend install && npm --prefix frontend run build && node backend/scripts/prepare-static.js && npm --prefix backend install
    startCommand: npm --prefix backend start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: SKIP_DB
        value: true
      - key: CORS_ORIGIN
        value: "*"
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: gemini
      - key: AI_MODEL
        value: gemini-2.0-flash
      - key: AI_API_URL
        value: https://generativelanguage.googleapis.com/v1beta
      - key: AI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
